# Yiliaoche Navigation Configuration
# Fixed YAML Indentation Issues

amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom_combined"
    laser_model_type: "likelihood_field"
    laser_max_range: 10.0
    laser_min_range: 0.3
    laser_topic: scan
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    transform_tolerance: 0.3
    update_min_a: 0.1
    update_min_d: 0.05
    z_hit: 0.5
    z_rand: 0.5

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom_combined
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_groot_monitoring: false
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      # Add Python custom recovery node ()
      - yiliaoche_navigation:register_nodes

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 8.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.15

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      ax_max: 2.0
      ax_min: -2.0
      ay_max: 2.0
      az_max: 3.0
      
      ackermann_constraints:
        enabled: true
        min_turning_radius: 0.5
        max_steering_angle: 0.5
        steering_angle_sampling: 0.1
      
      vx_std: 0.4
      vy_std: 0.0
      wz_std: 0.5
      vx_max: 0.8
      vx_min: -0.3
      vy_max: 0.0
      wz_max: 1.5
      
      trajectory_point_step: 2
      prune_distance: 1.0
      state_cost_weight: 1.0
      model_cost_weight: 0.5
      goal_cost_weight: 5.0
      goal_angle_cost_weight: 2.0
      path_cost_weight: 3.0
      obstacle_cost_weight: 10.0
      speed_cost_weight: 2.0
      
      critics: [
        "ObstaclesCritic", 
        "PathAlignCritic", 
        "PathFollowCritic", 
        "GoalCritic", 
        "GoalAngleCritic",
        "ConstraintCritic"
      ]
      
      ObstaclesCritic:
        enabled: true
        cost_weight: 10.0
        scaling_factor: 2.0
        min_distance: 0.15
      
      PathAlignCritic:
        enabled: true
        cost_weight: 3.0
        path_point_step: 3
        alignment_threshold: 0.5
      
      PathFollowCritic:
        enabled: true
        cost_weight: 2.0
        path_point_step: 3
      
      GoalCritic:
        enabled: true
        cost_weight: 5.0
        threshold_to_consider: 1.0
      
      GoalAngleCritic:
        enabled: true
        cost_weight: 2.0
        threshold_to_consider: 0.5
      
      ConstraintCritic:
        enabled: true
        cost_weight: 5.0
      
      use_rotate_to_heading: false
      allow_reversing: true
      regenerate_noises: true

controller_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom_combined
      robot_base_frame: base_link
      update_frequency: 15.0
      publish_frequency: 10.0
      footprint_padding: 0.03
      static_map: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.03
      robot_radius: 0.15
      plugins: ["obstacle_layer", "inflation_layer"]
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 8.0
        inflation_radius: 0.25
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 0.5
          min_obstacle_height: 0.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          inf_is_valid: false
      
      always_send_full_costmap: true

  local_costmap_client:
    ros__parameters:
      use_sim_time: false

  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      robot_base_frame: base_link
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      static_map: true
      resolution: 0.03
      track_unknown_space: false
      robot_radius: 0.15
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 0.5
          min_obstacle_height: 0.0
          clearing: true
          marking: true
          data_type: "LaserScan"
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 8.0
        inflation_radius: 0.25
      
      always_send_full_costmap: true

  global_costmap_client:
    ros__parameters:
      use_sim_time: false

  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "test.yaml"

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["HybridAStar"]
    
    HybridAStar:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      downsample_costmap: false
      downsampling_factor: 1
      resolution: 0.05
      tolerance: 0.125
      
      wheelbase: 0.3
      max_steering_angle: 0.5
      min_turning_radius: 0.5
      
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 64
      minimum_turning_radius: 0.5
      maximum_turning_radius: 2.0
      
      max_iterations: 2000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.0
      cost_travel_multiplier: 2.0
      motion_search_primitive: "FORWARD_ONLY"
      
      smoother:
        enabled: true
        max_iterations: 500
        w_smooth: 0.3
        w_data: 0.2
        w_curvature: 0.5
        tolerance: 1.0e-6
        do_refinement: true

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: false

recoveries_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["backup", "wait"]
    
    backup:
      plugin: "nav2_recoveries::BackUp"
      backup_distance: 0.5
      backup_speed: 0.15
      max_retries: 3
    
    wait:
      plugin: "nav2_recoveries::Wait"
      wait_duration: 2.0
    
    global_frame: odom_combined
    robot_base_frame: base_link
    transform_timeout: 0.1

robot_state_publisher:
  ros__parameters:
    use_sim_time: false

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 30
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: false
      waypoint_pause_duration: 0